<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Model AR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<script>
AFRAME.registerComponent('place-model', {
  init: function () {
    const scene = this.el.sceneEl;

    scene.addEventListener('click', () => {

      const model = document.createElement('a-entity');

      // ✅ Load model from assets
      model.setAttribute('gltf-model', '#tableModel');

      // ✅ Position
      model.setAttribute('position', '0 1 -3');

      // ✅ Try bigger scale first
      model.setAttribute('scale', '1 1 1');

      // ✅ Rotation
      model.setAttribute('animation',
        'property: rotation; to: 0 360 0; loop: true; dur: 8000');

      // ✅ Debug when loaded
      model.addEventListener('model-loaded', () => {
        console.log('Model loaded successfully');
      });

      model.addEventListener('model-error', (e) => {
        console.error('Model failed to load', e);
      });

      scene.appendChild(model);
    });
  }
});
</script>

<a-scene place-model>

  <!-- ✅ Assets -->
  <a-assets>
 <a-asset-item id="tableModel" src="./nighttable.glb"></a-asset-item>
  </a-assets>

  <!-- ✅ LIGHTS (VERY IMPORTANT) -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 2 1"></a-light>

  <!-- Camera -->
  <a-camera position="0 1.6 0"></a-camera>

</a-scene>

</body>
</html>
