<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Model Placement</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<script>
AFRAME.registerComponent('place-model', {
  init: function () {
    const scene = this.el;

    scene.addEventListener('click', () => {

      const model = document.createElement('a-entity');

      model.setAttribute('gltf-model', '#model');

      // Place in front of camera
      model.setAttribute('position', '0 0 -1.5');

      model.setAttribute('scale', '0.5 0.5 0.5');

      model.setAttribute('animation',
        'property: rotation; to: 0 360 0; loop: true; dur: 8000');

      scene.appendChild(model);
    });
  }
});
</script>

<!-- ✅ AR Scene -->
<a-scene
  place-model
  embedded
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
  background="color: transparent">

  <!-- ✅ Assets -->
  <a-assets>
    <a-asset-item id="model"
      src="https://cdn.aframe.io/test-models/models/Duck/glTF-Binary/Duck.glb">
    </a-asset-item>
  </a-assets>

  <!-- Light -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 2 1"></a-light>

  <!-- Camera -->
  <a-camera></a-camera>

</a-scene>

</body>
</html>
