<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Model AR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<script>
AFRAME.registerComponent('place-model', {
  init: function () {
    const scene = this.el;

    scene.addEventListener('loaded', () => {

      scene.addEventListener('click', () => {

        const model = document.createElement('a-entity');

        model.setAttribute('gltf-model', '#tableModel');

        model.setAttribute('position', '0 1.2 -2');
        model.setAttribute('scale', '0.5 0.5 0.5');

        model.setAttribute('animation',
          'property: rotation; to: 0 360 0; loop: true; dur: 8000');

        scene.appendChild(model);
      });

    });
  }
});
</script>

<a-scene place-model background="color: #ECECEC">

  <!-- ✅ Sample Model -->
  <a-assets>
    <a-asset-item id="tableModel"
      src="https://cdn.aframe.io/test-models/models/Duck/glTF-Binary/Duck.glb">
    </a-asset-item>
  </a-assets>

  <!-- Lights -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 2 1"></a-light>

  <!-- Camera -->
  <a-camera position="0 1.6 0">
    <a-cursor></a-cursor>
  </a-camera>

</a-scene>

</body>
</html>
