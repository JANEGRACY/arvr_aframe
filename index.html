<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Model Placement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false">

  <!-- Camera -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="model"
      src="titanic_lamp.glb">
    </a-asset-item>
  </a-assets>

  <!-- Reticle -->
  <a-entity id="reticle"
    geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06"
    material="color: red"
    visible="false">
  </a-entity>

</a-scene>

<script>
AFRAME.registerComponent('ar-place', {
  init: function () {
    const scene = this.el;
    const reticle = document.querySelector('#reticle');

    let hitTestSource = null;
    let referenceSpace = null;

    scene.renderer.xr.addEventListener('sessionstart', async () => {
      const session = scene.renderer.xr.getSession();

      referenceSpace = await session.requestReferenceSpace('viewer');
      hitTestSource = await session.requestHitTestSource({
        space: referenceSpace
      });

      session.requestAnimationFrame(onXRFrame);
    });

    function onXRFrame(t, frame) {
      const session = frame.session;
      const refSpace = scene.renderer.xr.getReferenceSpace();

      const hits = frame.getHitTestResults(hitTestSource);

      if (hits.length > 0) {
        const pose = hits[0].getPose(refSpace);

        reticle.setAttribute('position', {
          x: pose.transform.position.x,
          y: pose.transform.position.y,
          z: pose.transform.position.z
        });

        reticle.setAttribute('visible', true);
      } else {
        reticle.setAttribute('visible', false);
      }

      session.requestAnimationFrame(onXRFrame);
    }

    // Tap to place model
    scene.addEventListener('click', () => {
      if (!reticle.getAttribute('visible')) return;

      const model = document.createElement('a-entity');
      model.setAttribute('gltf-model', '#model');
      model.setAttribute('position', reticle.getAttribute('position'));
      model.setAttribute('scale', '0.3 0.3 0.3');

      scene.appendChild(model);
    });
  }
});

document.querySelector('a-scene').setAttribute('ar-place', '');
</script>

</body>
</html>
